name: Build Ubad APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Install MAUI
        run: dotnet workload install maui

      - name: Restore
        run: dotnet restore

      - name: Build APK
        run: dotnet publish Ubad.csproj -f net9.0-android -c Release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Ubad-APK
          path: |
            **/*.apk
